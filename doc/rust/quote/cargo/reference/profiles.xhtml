<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ja">
	<head>
		<title>blockquote</title>
		<meta name="robots" content="noindex"/>
		<link rel="stylesheet" href="../../../../../style/import/prism.css"/>
		<script src="../../../../../lib/prism_shadow.js"></script>
	</head>
	<body>
		<blockquote data-time="2026-04-02" cite="https://doc.rust-lang.org/cargo/reference/profiles.html#overflow-checks">
			<h3 id="overflow-checks">
<a class="header" href="#overflow-checks">overflow-checks</a>
			</h3>
			<p>
<code>overflow-checks</code> の設定は<a href="../../reference/expressions/operator-expr.html#overflow">実行時の整数のオーバーフロー</a>の挙動を調整する <a href="../../rustc/codegen-options/index.html#overflow-checks"><code>-C overflow-checks</code> フラグ</a>を制御する。オーバーフロー検査が有効になると、オーバーフロー発生時にパニックする。
			</p> <p>
妥当な選択肢:
			</p>
			<ul>
				<li> <code>true</code>: 有効</li>
				<li> <code>false</code>: 無効</li>
			</ul>
		</blockquote>
	</body>
</html>
